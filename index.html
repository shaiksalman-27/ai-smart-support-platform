<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Smart Support Automation Platform</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>AI Smart Support Automation Platform</h1>
        <p class="subtitle">Analyze issues, assign priority, categorize tickets, and manage support requests.</p>

        <div class="card">
            <h2>Submit an Issue</h2>
            <textarea id="issueInput" placeholder="Describe your issue here..."></textarea>
            <button onclick="analyzeIssue()">Analyze & Create Ticket</button>
        </div>

        <div class="card">
            <h2>AI Analysis Result</h2>
            <div id="resultBox">
                <p>No analysis yet.</p>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Tickets</h3>
                <p id="totalTickets">0</p>
            </div>
            <div class="stat-card">
                <h3>Open Tickets</h3>
                <p id="openTickets">0</p>
            </div>
            <div class="stat-card">
                <h3>Closed Tickets</h3>
                <p id="closedTickets">0</p>
            </div>
        </div>

        <div class="card">
            <h2>All Tickets</h2>
            <div id="ticketsList">
                <p>No tickets available.</p>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
