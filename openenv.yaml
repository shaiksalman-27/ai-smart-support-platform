name: openenv-supportops
version: "0.1.0"
description: >
  A real-world customer support ticket triage environment for AI agents.
  Agents classify issues, assign priority, request missing information,
  resolve safe cases, escalate risky cases, and close tickets safely.

entrypoint: app.main:app

environment:
  type: api
  host: 0.0.0.0
  port: 7860
  endpoints:
    reset: /reset
    step: /step
    state: /state
    tasks: /tasks
    grader: /grader
    baseline: /baseline

models:
  action: app.models.Action
  observation: app.models.Observation
  reward: app.models.RewardModel

tasks:
  - easy_password_reset
  - medium_payment_failure
  - hard_account_takeover